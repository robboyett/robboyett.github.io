<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky note component</title>
    <style>
        /*  ================================================================
            Sticky Note Component
            ────────────────────
            A Mac OS classic–style sticky note, recreated from Figma
            (node 3:423). Ships with Yellow, Blue, and Green presets
            but any colour pair works — just set the two custom props.

            REUSE ON ANOTHER PAGE
            1. Copy the @font-face block (and FindersKeepers.ttf)
            2. Copy everything between COMPONENT CSS START / END
            3. Drop the HTML from COMPONENT MARKUP into your page
            4. The note fills its parent — control size on the parent

            CSS custom properties (set on .sticky-note or a parent):
              --sticky-bg       Light background fill   (default #ffffb3)
              --sticky-accent   Border / header accent   (default #ffda00)

            Colour presets — add as a modifier class:
              .sticky-note--yellow   #ffffb3 / #ffda00
              .sticky-note--blue     #b3ffff / #00daff
              .sticky-note--green    #daffda / #87ff87
            ================================================================ */

        /* ── Font ──────────────────────────────────────────────────────── */
        @font-face {
            font-family: 'FindersKeepers';
            src: url('FindersKeepers.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ══════════════════════════════════════════════════════════════════
           COMPONENT CSS START
           ══════════════════════════════════════════════════════════════════ */

        .sticky-note {
            --sticky-bg: #ffffb3;
            --sticky-accent: #ffda00;

            position: relative;
            width: 100%;
            height: 100%;
            background: var(--sticky-bg);
            /* 1 px inset border (matches Figma's four coloured divs) */
            box-shadow: inset 0 0 0 1px var(--sticky-accent);
            overflow: hidden;
            font-family: 'FindersKeepers', 'Geneva', 'Helvetica Neue', system-ui, sans-serif;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: unset;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        /* ── Colour presets ────────────────────────────────────────────── */
        .sticky-note--yellow { --sticky-bg: #ffffb3; --sticky-accent: #ffda00; }
        .sticky-note--blue   { --sticky-bg: #b3ffff; --sticky-accent: #00daff; }
        .sticky-note--green  { --sticky-bg: #daffda; --sticky-accent: #87ff87; }

        /* ── Header bar (9 px, stipple pattern) ────────────────────────── */
        .sticky-note__header {
            position: absolute;
            top: 1px;
            left: 1px;
            right: 1px;
            height: 9px;
            overflow: hidden;

            /* 2×2 checkerboard stipple */
            background-color: var(--sticky-bg);
            background-image: conic-gradient(
                var(--sticky-accent) 90deg,
                var(--sticky-bg)     90deg 180deg,
                var(--sticky-accent) 180deg 270deg,
                var(--sticky-bg)     270deg
            );
            background-size: 2px 2px;

            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
        }

        /* ── Close button (7×7, left) ──────────────────────────────────── */
        .sticky-note__close {
            width: 7px;
            height: 7px;
            flex-shrink: 0;
            position: relative;
            cursor: default;
            background: var(--sticky-bg);
            /* Outer 1 px frame drawn by the SVG in Figma */
            box-shadow: inset 0 0 0 1px var(--sticky-accent);
        }

        /* Tiny × glyph (two 1 px diagonals inside a 5×5 interior) */
        .sticky-note__close::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            width: 1px;
            height: 1px;
            background: var(--sticky-accent);
            /* Pixel-art × using box-shadow on a 5×5 grid */
            box-shadow:
                /* top-left to bottom-right diagonal */
                0 0 0 0 var(--sticky-accent),
                1px 1px 0 0 var(--sticky-accent),
                2px 2px 0 0 var(--sticky-accent),
                3px 3px 0 0 var(--sticky-accent),
                4px 4px 0 0 var(--sticky-accent),
                /* top-right to bottom-left diagonal */
                4px 0 0 0 var(--sticky-accent),
                3px 1px 0 0 var(--sticky-accent),
                1px 3px 0 0 var(--sticky-accent),
                0 4px 0 0 var(--sticky-accent);
        }

        /* ── Zoom button (7×7, right) ──────────────────────────────────── */
        .sticky-note__zoom {
            width: 7px;
            height: 7px;
            flex-shrink: 0;
            position: relative;
            cursor: default;
            background: var(--sticky-bg);
            box-shadow: inset 0 0 0 1px var(--sticky-accent);
        }

        /* Small inner square (zoom icon) */
        .sticky-note__zoom::after {
            content: '';
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 3px;
            height: 3px;
            box-shadow: inset 0 0 0 1px var(--sticky-accent);
        }

        /* ── Text content ──────────────────────────────────────────────── */
        .sticky-note__content {
            position: absolute;
            top: 9px;
            left: 6px;
            right: 6px;
            bottom: 1px;
            font-size: 16px;
            line-height: 12px;
            color: #000;
            white-space: pre-wrap;
            overflow: hidden;
        }

        /* ── Resize handle (8×8, bottom-right) ─────────────────────────── */
        .sticky-note__resize {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 8px;
            height: 8px;
            overflow: hidden;
            cursor: se-resize;
        }

        /* Outer triangle (accent colour) */
        .sticky-note__resize::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top left,
                var(--sticky-accent) 50%,
                transparent 50%
            );
        }

        /* Inner triangle (bg colour, inset 1 px) */
        .sticky-note__resize::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            width: 6px;
            height: 6px;
            background: linear-gradient(
                to top left,
                var(--sticky-bg) 50%,
                transparent 50%
            );
        }

        /* ══════════════════════════════════════════════════════════════════
           COMPONENT CSS END
           ══════════════════════════════════════════════════════════════════ */


        /* ── Demo page chrome ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { visibility: hidden; }
        html.fonts-loaded { visibility: visible; }
        html, body { width: 100%; height: 100%; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px;
            /* System 7 desktop stipple */
            background-color: #666;
            background-image: radial-gradient(circle, #999 0.5px, transparent 0.5px);
            background-size: 2px 2px;
        }

        .demo-note {
            width: 252px;
            height: 94px;
        }
    </style>
</head>
<body>

    <!-- ════════════════════════════════════════════════════════════════════
         COMPONENT MARKUP — copy from here
         ════════════════════════════════════════════════════════════════════ -->

    <!-- Yellow -->
    <div class="demo-note">
        <div class="sticky-note sticky-note--yellow">
            <div class="sticky-note__header">
                <div class="sticky-note__close" aria-hidden="true"></div>
                <div class="sticky-note__zoom" aria-hidden="true"></div>
            </div>
            <div class="sticky-note__content">Make your notes stand
out and get noticed.</div>
            <div class="sticky-note__resize" aria-hidden="true"></div>
        </div>
    </div>

    <!-- Blue -->
    <div class="demo-note">
        <div class="sticky-note sticky-note--blue">
            <div class="sticky-note__header">
                <div class="sticky-note__close" aria-hidden="true"></div>
                <div class="sticky-note__zoom" aria-hidden="true"></div>
            </div>
            <div class="sticky-note__content">Make your notes stand
out and get noticed.</div>
            <div class="sticky-note__resize" aria-hidden="true"></div>
        </div>
    </div>

    <!-- Green -->
    <div class="demo-note">
        <div class="sticky-note sticky-note--green">
            <div class="sticky-note__header">
                <div class="sticky-note__close" aria-hidden="true"></div>
                <div class="sticky-note__zoom" aria-hidden="true"></div>
            </div>
            <div class="sticky-note__content">Make your notes stand
out and get noticed.</div>
            <div class="sticky-note__resize" aria-hidden="true"></div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════════════════════════════
         END COMPONENT MARKUP
         ════════════════════════════════════════════════════════════════════ -->

    <script>
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(() => document.documentElement.classList.add('fonts-loaded'));
        } else {
            document.documentElement.classList.add('fonts-loaded');
        }
    </script>
</body>
</html>
